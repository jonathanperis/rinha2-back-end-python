name: Build Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:
jobs:
  docs-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docs dependencies
        run: bun install --frozen-lockfile
        working-directory: docs

      - name: Check docs drift
        run: bun run check:drift
        working-directory: docs

      - name: Lint docs site
        run: bun run lint
        working-directory: docs

      - name: Build docs site
        run: npm run build
        working-directory: docs
        env:
          NODE_ENV: production

  container-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build and Run Docker Compose for Healthcheck Test
        run: docker compose -f ./docker-compose.yml up nginx --wait

      - name: Dump container logs on failure
        if: failure()
        run: docker compose -f ./docker-compose.yml logs db

      - name: Test Healthcheck Endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9999/healthz)
          if [ "$STATUS" -eq 200 ]; then
            echo "Healthcheck passed with status $STATUS"
          else
            echo "Healthcheck failed with status $STATUS"
            exit 1
          fi
